<script>
document.querySelectorAll(".circle").forEach(circle=>{
    circle.addEventListener("mouseenter",()=>{
        circle.classList.add("revealed");
    });
});

document.querySelectorAll(".circle2").forEach(circle=>{
    circle.addEventListener("click",()=>{
        circle.classList.add("revealed");
        circle.classList.toggle("squish");
    });
});

document.querySelectorAll(".circle3").forEach(circle=>{
    circle.addEventListener("click",()=>{
        circle.classList.add("revealed");
        circle.classList.add("grow");

        setTimeout(()=>{
            circle.classList.remove("grow");
        },400);
    });
});

document.querySelectorAll(".circle4").forEach(circle=>{
    circle.addEventListener("click",()=>{
        circle.classList.add("revealed");
        circle.classList.toggle("squish");
    });
});

document.querySelectorAll(".circle5").forEach(circle=>{
    circle.addEventListener("mouseenter",()=>{
        circle.classList.add("revealed");
    });
});

document.querySelectorAll(".circle6").forEach(circle=>{
    circle.addEventListener("mouseenter",()=>{
        circle.classList.add("revealed");
    });
});
</script>
